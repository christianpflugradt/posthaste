name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (for example v0.1.0)"
        required: true
        type: string

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: linux-x86_64
            runs_on: ubuntu-latest
            binary_suffix: ""
          - target_name: windows-x86_64
            runs_on: windows-latest
            binary_suffix: ".exe"
          - target_name: macos-arm64
            runs_on: macos-14
            binary_suffix: ""
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary (non-Windows)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/release/posthaste${{ matrix.binary_suffix }}" "dist/posthaste-${{ matrix.target_name }}${{ matrix.binary_suffix }}"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/release/posthaste${{ matrix.binary_suffix }}" "dist/posthaste-${{ matrix.target_name }}${{ matrix.binary_suffix }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target_name }}
          path: dist/posthaste-${{ matrix.target_name }}${{ matrix.binary_suffix }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - name: Download matrix binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: binary-*
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate consolidated checksums
        working-directory: release-assets
        run: |
          shopt -s nullglob
          files=(posthaste-*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found." >&2
            exit 1
          fi
          sha256sum "${files[@]}" > checksums.txt

      - name: Write release notes
        run: |
          cat > release-body.md <<'EOF'
          ## Assets
          This release includes native binaries for:
          - macOS arm64
          - Linux x86_64
          - Windows x86_64

          A consolidated `checksums.txt` file is included for integrity verification.

          ## Verify Checksums
          1. Download your target binary and `checksums.txt`.
          2. Run:
             - macOS/Linux: `sha256sum --check checksums.txt --ignore-missing`
             - Windows (PowerShell): `Get-FileHash .\posthaste-windows-x86_64.exe -Algorithm SHA256`
          3. Confirm the hash for your file matches the entry in `checksums.txt`.
          EOF

      - name: Publish GitHub release with binaries and checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          body_path: release-body.md
          files: |
            release-assets/posthaste-linux-x86_64
            release-assets/posthaste-macos-arm64
            release-assets/posthaste-windows-x86_64.exe
            release-assets/checksums.txt
