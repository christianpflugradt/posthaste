name: QA Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt check
        run: cargo fmt --check

      - name: Cargo clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Cargo test
        run: cargo test
