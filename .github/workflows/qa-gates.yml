name: QA Gates

on:
  pull_request:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/**"

jobs:
  qa-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: linux-x86_64
            runs_on: ubuntu-latest
          - target_name: windows-x86_64
            runs_on: windows-latest
          - target_name: macos-arm64
            runs_on: macos-14
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt check
        run: cargo fmt --check

      - name: Cargo clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Cargo test
        run: cargo test

      - name: Collect diagnostics (non-Windows)
        if: runner.os != 'Windows'
        run: |
          {
            echo "target=${{ matrix.target_name }}"
            echo "runner_os=${{ runner.os }}"
            echo "runner_arch=${{ runner.arch }}"
            rustc -vV
            cargo -V
          } > diagnostics.txt

      - name: Collect diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "target=${{ matrix.target_name }}" | Out-File -FilePath diagnostics.txt
          "runner_os=${{ runner.os }}" | Out-File -FilePath diagnostics.txt -Append
          "runner_arch=${{ runner.arch }}" | Out-File -FilePath diagnostics.txt -Append
          rustc -vV | Out-File -FilePath diagnostics.txt -Append
          cargo -V | Out-File -FilePath diagnostics.txt -Append

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.target_name }}
          path: diagnostics.txt
          retention-days: 7
